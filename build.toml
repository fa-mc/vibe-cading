# ── Build configuration ───────────────────────────────────────────────────────
# Each [[build]] entry generates one STEP file under output/.
# "model"  : dotted import path to the class (relative to models/)
# "output" : path under output/ for the generated STEP file
# "params" : keyword arguments passed to the class __init__
# ─────────────────────────────────────────────────────────────────────────────

# ── Technic ball bearing axle sleeves ─────────────────────────────────────────

[[build]]
model  = "technic_ball_bearing.axle_sleeve.AxleSleeve"
output = "technic_ball_bearing/axle_sleeve_5mm_id.step"
[build.params]
bearing_id       = 5.0
length           = 2.5
flange_od        = 7.0
flange_thickness = 0.8

[[build]]
model  = "technic_ball_bearing.axle_sleeve.AxleSleeve"
output = "technic_ball_bearing/axle_sleeve_8mm_id.step"
[build.params]
bearing_id       = 8.0
length           = 3.0
flange_od        = 10.5
flange_thickness = 1.0

# ── Arrma Vorteks 223S ────────────────────────────────────────────────────────

[[build]]
model  = "rc.vorteks_223s.esc_mount.EscMount"
output = "rc/vorteks_223s/esc_mount.step"
[build.params]
# all defaults — explicit here for reference
length           = 57.0
width            = 38.0
height           = 4.0

# ── XLego slipper gear assemblies (20T, 24T, 28T) ─────────────────────────────

[[build]]
model  = "xlego.slipper_gear.directional.steep.SlipperGearSteep"
output = "xlego/slipper_gear/slipper_gear_20t_assembly.step"

[build.params.ring_params]
teeth          = 20
pocket_r       = 7.0
ramp_r         = 5.5
sag_r          = 7.5

[build.params.plate_params]
plate_r        = 7.3
hub_r          = 4.0

[build.params.spring_params]
hub_r          = 4.0
ring_inner_r   = 7.0

[[build]]
model  = "xlego.slipper_gear.directional.steep.SlipperGearSteep"
output = "xlego/slipper_gear/slipper_gear_24t_assembly.step"
# Blank params object effectively uses defaults
[build.params]

[[build]]
model  = "xlego.slipper_gear.directional.steep.SlipperGearSteep"
output = "xlego/slipper_gear/slipper_gear_28t_assembly.step"

[build.params.ring_params]
teeth          = 28
pocket_r       = 11.0
ramp_r         = 9.0
sag_r          = 11.5

[build.params.plate_params]
plate_r        = 11.3
hub_r          = 6.475

[build.params.spring_params]
hub_r          = 6.475
ring_inner_r   = 11.0
