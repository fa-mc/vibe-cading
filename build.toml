# ── Build configuration ───────────────────────────────────────────────────────
# Each [[build]] entry generates one STEP file under output/.
# "model"  : dotted import path to the class (relative to models/)
# "output" : path under output/ for the generated STEP file
# "params" : keyword arguments passed to the class __init__
# ─────────────────────────────────────────────────────────────────────────────

# ── Technic ball bearing axle sleeves ─────────────────────────────────────────

[[build]]
model  = "technic_ball_bearing.axle_sleeve.AxleSleeve"
output = "technic_ball_bearing/axle_sleeve_5mm_id.step"
[build.params]
bearing_id       = 5.0
length           = 2.5
flange_od        = 7.0
flange_thickness = 0.8

[[build]]
model  = "technic_ball_bearing.axle_sleeve.AxleSleeve"
output = "technic_ball_bearing/axle_sleeve_8mm_id.step"
[build.params]
bearing_id       = 8.0
length           = 3.0
flange_od        = 10.5
flange_thickness = 1.0

# ── Arrma Vorteks 223S ────────────────────────────────────────────────────────

[[build]]
model  = "rc.vorteks_223s.esc_mount.EscMount"
output = "rc/vorteks_223s/esc_mount.step"
[build.params]
# all defaults — explicit here for reference
length           = 57.0
width            = 38.0
height           = 4.0

# ── XLego slipper gear assemblies (20T, 24T, 28T) ─────────────────────────────


[[build]]
model  = "xlego.slipper_gear.directional.steep.SlipperGearSteep"
output = "xlego/slipper_gear/slipper_gear_20t_assembly.step"
[build.params]
teeth          = 20

# ── XLego Servo Saver (Generic SG90 and Spektrum A370) ───────────────────────

[[build]]
model  = "xlego.servos.shaft_crown.ShaftCrown"
output = "xlego/servos/shaft_crown_sg90.step"
[build.params]
servo_profile = "SG90"

[[build]]
model  = "xlego.servos.shaft_crown.ShaftCrown"
output = "xlego/servos/shaft_crown_spmsa370.step"
[build.params]
servo_profile = "SPMSA370"

[[build]]
model  = "xlego.servos.shaft_body.ShaftBody"
output = "xlego/servos/shaft_body.step"
[build.params]
# Uses generic default params

[[build]]
model  = "xlego.servos.shaft.Shaft"
output = "xlego/servos/shaft.step"
[build.params]
# Uses generic default params




[[build]]
model  = "xlego.servos.sg90.servo_mount_half.ServoCase"
output = "xlego/servos/sg90/servo_mount_half.step"
[build.params]
# Uses generic default params

[[build]]
model  = "xlego.servos.sg90.servo_mount.ServoMountAssembly"
output = "xlego/servos/sg90/servo_mount_assembly.step"

# ── XLego Special Adapters ───────────────────────────────────────────────────

[[build]]
model  = "xlego.axle_to_pin_bore_adapter.AxleToPinBoreAdapter"
output = "xlego/axle_to_pin_bore_adapter.step"
[build.params]
# No params required

# ── XLego Motor Mount Plates ──────────────────────────────────────────────────

[[build]]
model  = "xlego.motors.mount_plate.MotorMountPlate"
output = "xlego/motors/mount_plate_370.step"
[build.params]
gearbox_screw_size     = "M2.5"
motor_screw_size       = "M3"
motor_hole_dist        = 17.0
motor_boss_clearance_d = 9.0
material               = "PETG"
