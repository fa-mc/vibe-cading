[pytest]
# Minimum supported Python runtime for vibe-cading.
# >=3.10 is required so the codebase can rely on typing.Protocol,
# PEP-604 union syntax (`X | Y`), and structural-typing maturity.
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
