# ── Visual-contract manifest ──────────────────────────────────────────────────
# Each [[contract]] entry registers one tracked visual_contracts/*_design_*.svg
# visual contract.  tools/check_visual_contract_freshness.py regenerates each
# via tools/preview.py's export_previews() and byte-compares against the
# committed file (with a coverage gate against unregistered design SVGs), so
# the `committed == regenerable` invariant can no longer silently break.
#
#   "svg"    : path to the committed SVG, relative to the repo root.
#   "model"  : full dotted import path to the source class.
#   "view"   : a named view from tools/preview.py NAMED_VIEWS
#              (top / front / left / iso_ne / …).
#   "params" : constructor kwargs, in a [contract.params] sub-table.  REQUIRED
#              where the class has no defaults — e.g.
#              LegoTechnicBeam.length_in_studs is a required positional arg, so
#              the three beam entries below MUST carry it.  Entries whose class
#              takes only defaults omit [contract.params].
#
# Label suppression (labels = false):
#   The four parameter-sweep gauges engrave numeric labels via
#   cq.Workplane.text().  Glyph tessellation depends on the *host* font
#   (fontconfig substitutes font="Arial" with a host-specific binary) and the
#   host freetype version, so the glyph wire geometry — and therefore the SVG
#   bytes — differ between the CI runner and a contributor's clone.  Byte-pinning
#   that glyph soup would drift across hosts while protecting nothing the visual
#   contract exists to protect (axis convention, hole/pocket pattern, datum —
#   see vibe/INSTRUCTIONS.md §Visual Contract Deliverable).  The six gauge rows
#   therefore render with [contract.params] labels = false: the contract pins the
#   geometry, not the host-dependent glyphs, keeping it a pure function of
#   tracked repo state.  The beam rows are text-free and need no suppression.
#
# Refresh all contracts after a legitimate geometry change:
#   python3.11 tools/check_visual_contract_freshness.py --update
# (cadquery lives on the 3.11 interpreter in this container; the default
# `python3` is 3.13 without cadquery.  CI runs it as `python3` because
# actions/setup-python pins 3.11 there.)
# ─────────────────────────────────────────────────────────────────────────────

# ── LegoTechnicBeam (length_in_studs is a REQUIRED arg — no default) ───────────

[[contract]]
svg   = "visual_contracts/2026-05-15-lego-technic-beam_design_iso_ne.svg"
model = "vibe_cading.lego.technic_beam.LegoTechnicBeam"
view  = "iso_ne"
[contract.params]
length_in_studs = 5

[[contract]]
svg   = "visual_contracts/2026-05-15-lego-technic-beam_design_top.svg"
model = "vibe_cading.lego.technic_beam.LegoTechnicBeam"
view  = "top"
[contract.params]
length_in_studs = 5

[[contract]]
svg   = "visual_contracts/2026-05-15-lego-technic-beam_design_front.svg"
model = "vibe_cading.lego.technic_beam.LegoTechnicBeam"
view  = "front"
[contract.params]
