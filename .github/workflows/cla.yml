name: "CLA Assistant"
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

# Note: this workflow runs on `pull_request_target` with write tokens, so it
# executes in the base-repo context against fork PRs. To minimise blast
# radius the third-party action is pinned to a commit SHA (not a floating
# tag), and the `permissions:` block is scoped to the minimum the action
# documents needing.

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    permissions:
      # Permission set established empirically in commit e6583e7 — the
      # action was failing with "Resource not accessible by integration"
      # against this repo's narrow default GITHUB_TOKEN until each of
      # these was granted. Do NOT drop any of these without first
      # validating against a real fork PR that the bot's GraphQL calls
      # still succeed.
      actions: write        # action calls workflow_runs API (e6583e7)
      contents: write       # update signatures/version2/cla.json on the cla-signatures branch
      pull-requests: write  # post the CLA comment on the PR
      statuses: write       # mark the CLA check status on the PR
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        # Pinned to v2.6.1 (commit ca4a40a7d1004f18d9960b404b97e5f30a505a08).
        # Bump deliberately after re-reading the upstream changelog — never
        # accept a floating tag here because the token grants write access
        # to this repo from fork-PR context.
        uses: cla-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08
        env:
          # GITHUB_TOKEN suffices: signatures are written to the UNPROTECTED
          # cla-signatures branch (see `branch:` below), so no privileged
          # PERSONAL_ACCESS_TOKEN / bypass credential is needed. Do NOT add one
          # back — a long-lived admin PAT readable from this pull_request_target
          # (fork-PR) context is a secret-exfiltration surface.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: 'signatures/version2/cla.json'
          path-to-document: 'https://github.com/fa-mc/vibe-cading/blob/main/CLA.md'
          # Store the signature ledger on the dedicated, UNPROTECTED
          # `cla-signatures` orphan branch — NOT on `main`. main's
          # branch-protection ruleset forbids the bot's direct push (it would
          # fail with "Repository rule violations found"); writing the ledger
          # off-main keeps main fully protected with no bot bypass actor and no
          # admin PAT. Do NOT change this back to `main`. See CONTRIBUTING.md §1.
          branch: 'cla-signatures'
          allowlist: 'dependabot[bot],greenkeeper[bot]'
