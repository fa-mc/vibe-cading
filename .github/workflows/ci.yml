name: ci

# Baseline lint + import-check + build smoke. See
# .agents/plans/2026-05-08-ci-baseline_design.md.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-ci.txt
      - name: Install CI dependencies
        run: pip install -r requirements-ci.txt
      - name: Lint (flake8)
        run: flake8 .
      - name: Import-check (py_compile)
        run: |
          set -euo pipefail
          mapfile -t files < <(
            find vibe_cading parts tools -type f -name '*.py' \
              ! -path '*/tmp/*' \
              ! -path '*/__pycache__/*'
          )
          empty=0
          checked=0
          for f in "${files[@]}"; do
            if [[ "$(basename "$f")" == "__init__.py" && ! -s "$f" ]]; then
              empty=$((empty + 1))
              continue
            fi
            python -m py_compile "$f"
            checked=$((checked + 1))
          done
          echo "py_compile: $checked file(s) checked, $empty empty __init__.py skipped"
      - name: Check no __main__ blocks under vibe_cading/ or parts/ (AST)
        run: python tools/check_no_main_blocks.py
      - name: Check no __main__ blocks under vibe_cading/ or parts/ (grep belt-and-braces)
        run: |
          set -euo pipefail
          if grep -rlE 'if __name__ == "__main__"' vibe_cading/ parts/; then
            echo "Forbidden __main__ block found in vibe_cading/ or parts/" >&2
            exit 1
          fi
      - name: Check no ocp_vscode imports outside tools/view.py
        run: |
          set -euo pipefail
          # Matches both `from ocp_vscode import …` and `import ocp_vscode`.
          matches=$(grep -rlE '(from|import) ocp_vscode' vibe_cading/ parts/ tools/ || true)
          # Allow exactly tools/view.py and nothing else.
          unexpected=$(echo "$matches" | grep -vE '^tools/view\.py$' || true)
          if [ -n "$unexpected" ]; then
            echo "Unexpected ocp_vscode importers:" >&2
            echo "$unexpected" >&2
            exit 1
          fi
      - name: Pytest (unit + smoke tests)
        run: python -m pytest tests/ -v
      - name: Build smoke (python build.py)
        # Catches OCCT/CadQuery runtime regressions that pytest/py_compile miss
        # (boolean kernel failures, geometry-assertion breakage, topology drift).
        # Also enforces AGPLv3 headers via tools/check_license_headers.py
        # (build.py.__main__ runs it before the build).
        # Outputs land under output/ which is gitignored — nothing is committed.
        run: python build.py
