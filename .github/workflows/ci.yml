name: ci

# Baseline lint + import-check + build smoke. See
# .agents/plans/2026-05-08-ci-baseline_design.md.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-ci.txt
      - name: Install CI dependencies
        run: pip install -r requirements-ci.txt
      - name: Lint (flake8)
        run: flake8 .
      - name: Import-check (py_compile)
        run: |
          set -euo pipefail
          mapfile -t files < <(
            find vibe_cading parts tools -type f -name '*.py' \
              ! -path '*/tmp/*' \
              ! -path '*/__pycache__/*'
          )
          empty=0
          checked=0
          for f in "${files[@]}"; do
            if [[ "$(basename "$f")" == "__init__.py" && ! -s "$f" ]]; then
              empty=$((empty + 1))
              continue
            fi
            python -m py_compile "$f"
            checked=$((checked + 1))
          done
          echo "py_compile: $checked file(s) checked, $empty empty __init__.py skipped"
      - name: Check no __main__ blocks under vibe_cading/ or parts/ (AST)
        run: python vibe_cading/tools/check_no_main_blocks.py
      - name: Check no __main__ blocks under vibe_cading/ or parts/ (grep belt-and-braces)
        run: |
          set -euo pipefail
          # vibe_cading/tools/ holds the sanctioned CLI entry points, which
          # legitimately carry __main__ guards — exclude them (same carve-out
          # as the AST checker above).
          matches=$(grep -rlE 'if __name__ == "__main__"' vibe_cading/ parts/ || true)
          unexpected=$(echo "$matches" | grep -vE '^vibe_cading/tools/' || true)
          if [ -n "$unexpected" ]; then
            echo "Forbidden __main__ block found in vibe_cading/ or parts/:" >&2
            echo "$unexpected" >&2
            exit 1
          fi
      - name: Check no ocp_vscode imports outside vibe_cading/tools/view.py
        run: |
          set -euo pipefail
          # Matches both `from ocp_vscode import …` and `import ocp_vscode`.
          matches=$(grep -rlE '(from|import) ocp_vscode' vibe_cading/ parts/ || true)
          # Allow exactly vibe_cading/tools/view.py and nothing else.
          unexpected=$(echo "$matches" | grep -vE '^vibe_cading/tools/view\.py$' || true)
          if [ -n "$unexpected" ]; then
            echo "Unexpected ocp_vscode importers:" >&2
            echo "$unexpected" >&2
            exit 1
          fi
      - name: MCP import isolation (Layer A AST + Layer B live-import)
        # The optional vibe_cading.mcp subpackage and the `mcp` SDK MUST NOT leak
        # onto library-only consumers (design R7).  `mcp` is intentionally NOT
        # installed in this lint stage, so Layer B ("import vibe_cading leaves
        # sys.modules free of mcp / vibe_cading.mcp.*") is a meaningful no-leak
        # assertion here.  Stdlib-only; runs before CadQuery / the SDK exist.
        run: python vibe_cading/tools/check_mcp_import_isolation.py
      - name: MCP import isolation (grep belt-and-braces twin)
        run: |
          set -euo pipefail
          # vibe_cading/mcp/ legitimately imports the SDK in __main__.py /
          # server.py; vibe_cading/tools/ are CLI entry points (same carve-out
          # as the no-main-block / ocp_vscode guards).  Subtract both.
          matches=$(grep -rlE '(from|import) (mcp|vibe_cading\.mcp)' vibe_cading/ parts/ || true)
          unexpected=$(echo "$matches" | grep -vE '^vibe_cading/(mcp|tools)/' || true)
          if [ -n "$unexpected" ]; then
            echo "Forbidden mcp / vibe_cading.mcp import found outside the carve-out:" >&2
            echo "$unexpected" >&2
            exit 1
          fi
      - name: Pytest (unit + smoke tests)
        run: python -m pytest tests/ -v
      - name: Build smoke (python build.py)
        # Catches OCCT/CadQuery runtime regressions that pytest/py_compile miss
        # (boolean kernel failures, geometry-assertion breakage, topology drift).
        # Also enforces AGPLv3 headers via vibe_cading/tools/check_license_headers.py
        # (build.py.__main__ runs it before the build).
        # Outputs land under output/ which is gitignored — nothing is committed.
        run: python build.py
      - name: Topology check
        # Runs vibe_cading/tools/check_topology.py against every [[build]] entry in
        # build.toml.  Fails on any disconnected-body regression (floating
        # artifacts, failed boolean cuts, un-merged outer components) that
        # `python build.py` itself would silently pass.
        #
        # FR3 allowlist: per-target --ignore overrides keyed by FQ class
        # path, kept in sync with the matching block in
        # tmp/topology_sweep_with_allowlist.sh (local-reproduction script).
        # Every override carries a why-comment so a future contributor
        # removing the assembly notices the stale entry.
        run: |
          set -uo pipefail
          declare -A IGNORE_OVERRIDES=(
              # Pre-arranged print plate: ServoMountBase + ServoMountClamp
              # composed via cq.Workplane().add().add() — expect 2 bodies.
              ["vibe_cading.lego_adapters.servos.sg90.servo_mount.ServoMountAssembly"]=1
              # R&D slipper-gear assembly: plate + ring + 4 spring parts
              # composed via cq.Assembly().toCompound() — expect 6 bodies.
              ["experiments.slipper_gear.directional.steep.SlipperGearSteep"]=5
              # Print-in-place hinge: leaf_a + leaf_b (the knuckle bridge
              # is part of leaf_a in the default knuckle_count=3 config) —
              # expect 2 bodies.
              ["vibe_cading.mechanical.hinge.PrintInPlaceHinge"]=1
          )
          mapfile -t entries < <(python3 -c "
          import tomllib
          with open('build.toml','rb') as f:
              cfg = tomllib.load(f)
          for e in cfg['build']:
              params = e.get('params', {})
              pstr = ' '.join(f'--params {k}={v}' for k, v in params.items()) if params else ''
              print(f\"{e['model']}|{pstr}\")
          ")
          total=${#entries[@]}
          passed=0
          failed=0
          for entry in "${entries[@]}"; do
              model="${entry%%|*}"
              pstr="${entry#*|}"
              ignore="${IGNORE_OVERRIDES[$model]:-0}"
              echo "::: $model (--ignore $ignore)"
              # shellcheck disable=SC2086
              if python3 vibe_cading/tools/check_topology.py "$model" $pstr --ignore "$ignore"; then
                  passed=$((passed + 1))
              else
                  failed=$((failed + 1))
              fi
              echo
          done
          echo "================================================================"
          echo "$passed / $total targets passed, $failed failed"
          [[ "$failed" -eq 0 ]] || exit 1
      - name: Visual contract freshness
        # Regenerates every .agents/plans/*_design_*.svg registered in
        # visual_contracts.toml via vibe_cading/tools/preview.py's export_previews() and
        # byte-compares against the committed file; fails on drift or on a
        # tracked design SVG missing from the manifest (coverage gate).  Runs
        # after Build smoke / Topology check so CadQuery is installed +
        # validated.  `python3` here is the 3.11 + cadquery interpreter
        # actions/setup-python pins (same one build.py and the topology step
        # use).  Local contributors run it as `python3.11`.
        run: python3 vibe_cading/tools/check_visual_contract_freshness.py
      - name: MCP SDK tests (install the [mcp] extra, run smoke + contract snapshot)
        # Runs LAST, after every CadQuery-bearing step and after the MCP import
        # isolation step (so Layer B above asserted `mcp` ABSENT in the lint
        # stage — installing the SDK here does not retroactively affect it).
        # The smoke + snapshot tests are gated with pytest.importorskip("mcp"):
        # they SKIP in the earlier Pytest step (mcp absent) and run for real
        # here once the optional extra is installed.  See the design's OQ6
        # CI-wiring table + Challenge-F env matrix.
        run: |
          set -euo pipefail
          pip install -e ".[mcp]"
          python -m pytest \
            tests/mcp/test_stdio_smoke.py \
            tests/mcp/test_tool_contract_snapshot.py \
            -v
