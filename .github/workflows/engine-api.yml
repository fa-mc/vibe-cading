name: engine-api

# Guards `engine_api.json` against drift from `vibe_cading/**` and `parts/**`.
# The artifact is a tracked file under `vibe_cading/` that downstream LLM code-gen
# tooling consumes; if it falls out of sync, downstream code-gen breaks.
#
# See `CONTRIBUTING.md` §"Engine API Artifact" and the extractor at
# `vibe_cading/tools/engine_api/extractor.py` for the schema contract and regeneration flow.

on:
  pull_request:
    paths:
      - "vibe_cading/**"
      - "parts/**"
      - "vibe_cading/tools/engine_api/**"
      - "vibe_cading/tools/gen_engine_api.py"
      - "vibe_cading/tools/validate_engine_api.py"
      - "vibe_cading/engine_api.json"
      - ".github/workflows/engine-api.yml"
  push:
    branches: [main]
    paths:
      - "vibe_cading/**"
      - "parts/**"
      - "vibe_cading/tools/engine_api/**"
      - "vibe_cading/tools/gen_engine_api.py"
      - "vibe_cading/tools/validate_engine_api.py"
      - "vibe_cading/engine_api.json"
      - ".github/workflows/engine-api.yml"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          # Matches the dev container (.devcontainer/Dockerfile uses
          # python:3.11-slim). Pin a single recent 3.x — the extractor is
          # pure stdlib so we do not need a matrix.
          python-version: "3.11"
      - name: Regenerate engine_api.json (in memory) and diff against tree
        run: python3 vibe_cading/tools/gen_engine_api.py --check
      - name: Validate engine_api.json against schema invariants
        run: python3 vibe_cading/tools/validate_engine_api.py
